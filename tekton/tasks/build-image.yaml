# Task: Build a container image using Kaniko (no Docker daemon needed)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-image
  namespace: tekton-demo
  labels:
    app.kubernetes.io/part-of: tekton-demo
spec:
  description: Build a container image using Kaniko and push to a local registry.
  params:
    - name: IMAGE
      type: string
      description: Full image reference (e.g., scores-api:v1)
    - name: CONTEXT
      type: string
      description: Build context directory inside the workspace
      default: "."
    - name: DOCKERFILE
      type: string
      description: Path to the Dockerfile relative to the context
      default: "Dockerfile"
    - name: APP_VERSION
      type: string
      description: Application version to pass as build argument
      default: "v1"
  workspaces:
    - name: source
      description: Workspace containing the source code
  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:latest
      command:
        - /kaniko/executor
      args:
        - "--dockerfile=$(params.DOCKERFILE)"
        - "--context=dir://$(workspaces.source.path)/$(params.CONTEXT)"
        - "--destination=$(params.IMAGE)"
        - "--no-push"
        - "--build-arg=APP_VERSION=$(params.APP_VERSION)"
